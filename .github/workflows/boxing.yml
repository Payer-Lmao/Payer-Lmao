name: Generate Boxing Animation

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Generate Snake (Boxing style)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: Payer-Lmao
          outputs: |
            dist/boxing-dark.svg?color_snake=#f5e100&color_dot_empty=#1a1a1a&color_dot_filled=#7c3aed,#a855f7,#c084fc,#e879f9,#f5e100
            dist/boxing-light.svg?color_snake=#f5e100&color_dot_empty=#eee&color_dot_filled=#7c3aed,#a855f7,#c084fc,#e879f9,#f5e100

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
